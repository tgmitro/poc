<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style type="text/css">
    body { background:#fff; color:#000; font-family:sans-serif; font-size:12pt; margin:10px; }
    .box { border:1px solid #666; padding:10px; background:#eee; }
    .error { color:#900; font-weight:bold; }
  </style>
</head>
<body>
  <h1>Dashboard Login</h1>
  <div class="box">
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <p>Enter PIN:<br />
      <input type="password" name="pin" size="10" /></p>
      <p><input type="submit" value="Unlock" /></p>
    </form>
  </div>
  <p style="font-size:9pt; color:#555; margin-top:20px;">2026 &copy; TOMIG</p>
</body>
</html>
